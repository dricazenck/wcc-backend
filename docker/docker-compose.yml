services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MFpFnhhICniFNPA
      POSTGRES_DB: wcc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  
networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: